<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>okayama V6 🍑</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-bg: #A36E6E; /* 岡山玫瑰粉 */
            --secondary-bg: #F8F9FA;
            --accent-color: #A36E6E;
            --text-main: #333333;
            --text-light: #8E8E93;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 80px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header & Date Tabs */
        .header-bg {
            background-color: var(--primary-bg);
            padding: 30px 20px 40px;
            border-radius: 0 0 40px 40px;
            text-align: center;
        }

        .trip-title {
            color: white;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .date-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            overflow-x: auto;
            padding: 5px;
        }

        .date-tab {
            background: rgba(255,255,255,0.2);
            color: white;
            min-width: 65px;
            height: 75px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            opacity: 0.7;
        }

        .date-tab.active {
            background: white;
            color: var(--primary-bg);
            opacity: 1;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* 交通時間樣式 (改回釜山版的簡潔樣式) */
        .transport-divider {
            display: flex;
            align-items: center;
            padding: 10px 35px;
            color: var(--text-light);
            font-size: 14px;
        }
        .transport-divider i {
            margin-right: 8px;
        }

        /* 行程卡片 */
        .plan-item {
            background: white;
            margin: 15px 20px;
            padding: 20px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .time-tag {
            background: #E8F2F2;
            color: #8BB8B8;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 12px;
        }

        /* 錢包樣式 */
        .wallet-card {
            background: var(--primary-bg);
            margin: -25px 20px 20px;
            padding: 30px 20px;
            border-radius: 30px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(163, 110, 110, 0.3);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .summary-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 20px;
            text-align: left;
        }

        /* 待買清單樣式 */
        .shop-item {
            background: white;
            margin: 10px 20px;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .shop-item.purchased {
            opacity: 0.5;
            background: #f0f0f0;
        }
        
        .shop-item.purchased .item-name {
            text-decoration: line-through;
        }

        /* Modal 行程編輯 (恢復釜山版排版) */
        .modal-body-plan {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width { grid-column: span 2; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px;
            border-top: 1px solid #EEEEEE;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #D1D1D6;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .nav-item.active {
            color: var(--primary-bg);
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .add-btn {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: var(--primary-bg);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 20px rgba(163, 110, 110, 0.4);
            border: none;
            z-index: 99;
        }

        /* Utility */
        .hidden { display: none; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 100%;
            padding: 25px;
            border-radius: 30px 30px 0 0;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="header-bg">
            <div class="flex justify-between items-center mb-6 px-2">
                <i class="fas fa-bars text-white text-xl"></i>
                <div class="text-white font-medium">web App</div>
                <div class="flex gap-4">
                    <i class="far fa-edit text-white text-xl" onclick="toggleEditMode()"></i>
                    <i class="fas fa-share-alt text-white text-xl" onclick="exportToImage()"></i>
                </div>
            </div>
            <h1 class="trip-title">2026 okayama</h1>
            <div class="date-tabs" id="dateTabs">
                </div>
        </header>

        <div id="mainContent">
            </div>

        <button class="add-btn" id="masterAddBtn" onclick="openAddModal()">
            <i class="fas fa-plus"></i>
        </button>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('PLAN')">
                <i class="fas fa-calendar-alt"></i>
                <span>PLAN</span>
            </div>
            <div class="nav-item" onclick="switchTab('WALLET')">
                <i class="fas fa-wallet"></i>
                <span>WALLET</span>
            </div>
            <div class="nav-item" onclick="switchTab('SHOP')">
                <i class="fas fa-shopping-bag"></i>
                <span>SHOP</span>
            </div>
        </nav>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            databaseURL: "https://okayama-trip-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- App State ---
        let currentState = {
            view: 'PLAN',
            currentDay: 23,
            days: [
                { date: 23, day: 'THU' },
                { date: 24, day: 'FRI' },
                { date: 25, day: 'SAT' },
                { date: 26, day: 'SUN' }
            ],
            plans: {},
            expenses: [],
            shopItems: []
        };

        // --- Initialization ---
        function init() {
            renderDateTabs();
            listenToData();
            switchTab('PLAN');
        }

        function listenToData() {
            db.ref('tripData').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                currentState.plans = data.plans || {};
                currentState.expenses = Object.values(data.expenses || {});
                currentState.shopItems = Object.values(data.shopItems || {});
                render();
            });
        }

        // --- Rendering ---
        function renderDateTabs() {
            const container = document.getElementById('dateTabs');
            container.innerHTML = currentState.days.map(d => `
                <button class="date-tab ${d.date === currentState.currentDay ? 'active' : ''}" 
                        onclick="setCurrentDay(${d.date})">
                    <span class="text-lg font-bold">${d.date}</span>
                    <span class="text-xs">${d.day}</span>
                </button>
            `).join('');
        }

        function switchTab(tab) {
            currentState.view = tab;
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                el.classList.toggle('active', ['PLAN', 'WALLET', 'SHOP'][idx] === tab);
            });
            render();
        }

        function setCurrentDay(day) {
            currentState.currentDay = day;
            renderDateTabs();
            render();
        }

        function render() {
            const container = document.getElementById('mainContent');
            if (currentState.view === 'PLAN') renderPlans(container);
            else if (currentState.view === 'WALLET') renderWallet(container);
            else if (currentState.view === 'SHOP') renderShop(container);
        }

        // 1. 行程渲染 (包含恢復的通勤樣式)
        function renderPlans(container) {
            const dayPlans = Object.entries(currentState.plans)
                .map(([id, p]) => ({...p, id}))
                .filter(p => p.day === currentState.currentDay)
                .sort((a, b) => a.time.localeCompare(b.time));

            let html = `<div class="py-4" id="exportArea">`;
            dayPlans.forEach((plan, index) => {
                html += `
                    <div class="plan-item" onclick="openEditPlan('${plan.id}')">
                        <div class="time-tag">${plan.time}</div>
                        <div class="text-xl font-bold mb-1">${plan.name}</div>
                        ${plan.memo ? `<div class="text-sm text-gray-400 mb-3">${plan.memo}</div>` : ''}
                        <div class="flex items-center text-gray-400 text-sm">
                            <i class="fas fa-bus mr-2"></i> ${plan.transportTime || '0'}m
                        </div>
                    </div>
                `;
                // 改回釜山版簡單明瞭的通勤時間 (指令2)
                if (index < dayPlans.length - 1) {
                    html += `
                        <div class="transport-divider">
                            <i class="fas fa-car"></i> ${plan.transportTime || '0'}m
                        </div>
                    `;
                }
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // 2. 錢包渲染 (增加剩餘現金與換算，指令5)
        function renderWallet(container) {
            const rate = 0.21;
            const beforeTrip = currentState.expenses.filter(e => e.type === '行前').reduce((sum, e) => sum + Number(e.amount), 0);
            const actualSpent = currentState.expenses.filter(e => e.type === '實際').reduce((sum, e) => sum + Number(e.amount), 0);
            const totalIncome = currentState.expenses.filter(e => e.type === '換錢').reduce((sum, e) => sum + Number(e.amount), 0);
            
            const cashLeft = totalIncome - actualSpent;

            container.innerHTML = `
                <div class="wallet-card">
                    <div class="text-xs opacity-80 mb-2">TOTAL SPENT</div>
                    <div class="text-4xl font-bold">¥ ${beforeTrip + actualSpent}</div>
                    <div class="text-sm opacity-80 mt-1">≈ NT$ ${Math.round((beforeTrip + actualSpent) * rate)}</div>
                    
                    <div class="summary-grid">
                        <div class="summary-box">
                            <div class="text-[10px] opacity-70 mb-1"><i class="fas fa-wallet mr-1"></i> 剩餘日幣</div>
                            <div class="font-bold text-lg">¥ ${cashLeft}</div>
                            <div class="text-[10px] opacity-70">NT$ ${Math.round(cashLeft * rate)}</div>
                        </div>
                        <div class="summary-box">
                            <div class="text-[10px] opacity-70 mb-1"><i class="fas fa-credit-card mr-1"></i> 實際支出</div>
                            <div class="font-bold text-lg">¥ ${actualSpent}</div>
                            <div class="text-[10px] opacity-70">NT$ ${Math.round(actualSpent * rate)}</div>
                        </div>
                    </div>
                    <div class="mt-4 text-left px-2">
                        <span class="text-[10px] opacity-70">行前支出：¥ ${beforeTrip} (NT$ ${Math.round(beforeTrip * rate)})</span>
                    </div>
                </div>
                <div class="px-5 pb-10">
                    ${currentState.expenses.reverse().map(e => `
                        <div class="bg-white p-4 rounded-2xl mb-3 flex justify-between items-center shadow-sm">
                            <div class="flex items-center">
                                <div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center mr-3 text-rose-800">
                                    <i class="fas ${e.type === '換錢' ? 'fa-exchange-alt' : 'fa-store'}"></i>
                                </div>
                                <div>
                                    <div class="font-bold">${e.name}</div>
                                    <div class="text-[10px] text-gray-400">${e.category} | ${e.payMethod}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold ${e.type === '換錢' ? 'text-green-500' : ''}">
                                    ${e.type === '換錢' ? '+' : '-'} ¥${e.amount}
                                </div>
                                <div class="text-[10px] text-gray-400">NT$ ${Math.round(e.amount * rate)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 3. 待買清單渲染 (自動下移與排序，指令4)
        function renderShop(container) {
            // 排序：未購買在上，已購買在下 (指令4)
            const sortedItems = [...currentState.shopItems].sort((a, b) => (a.purchased === b.purchased) ? 0 : a.purchased ? 1 : -1);

            container.innerHTML = `
                <div class="px-5 pt-4">
                    <h2 class="text-gray-400 text-xs tracking-widest mb-4">SHOPPING LIST</h2>
                    <div id="sortableShopList">
                        ${sortedItems.map(item => `
                            <div class="shop-item ${item.purchased ? 'purchased' : ''}" data-id="${item.id}">
                                <div class="mr-4" onclick="toggleShopItem('${item.id}')">
                                    <i class="${item.purchased ? 'fas fa-check-circle text-rose-400' : 'far fa-circle text-gray-300'} text-xl"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="item-name font-bold">${item.name}</div>
                                    <div class="text-xs text-gray-400">${item.category || '食物'}</div>
                                </div>
                                ${item.img ? `<img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // 初始化長按排序 (指令4)
            const el = document.getElementById('sortableShopList');
            new Sortable(el, {
                animation: 150,
                onEnd: function() {
                    console.log('Order updated');
                }
            });
        }

        // --- Modal Actions ---
        function openAddModal() {
            if (currentState.view === 'PLAN') openPlanModal();
            else if (currentState.view === 'WALLET') openWalletModal();
            else if (currentState.view === 'SHOP') openShopModal();
        }

        // 恢復釜山版行程新增介面 (指令1)
        function openPlanModal(planId = null) {
            const plan = planId ? currentState.plans[planId] : { name: '', time: '09:00', transportTime: '', stayTime: '', memo: '', link: '' };
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">行程</h2>
                    <i class="fas fa-times text-gray-300" onclick="closeModal()"></i>
                </div>
                <div class="modal-body-plan">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">時間</label>
                        <input type="time" id="pTime" value="${plan.time}" class="w-full p-3 bg-gray-50 rounded-xl border-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">地點</label>
                        <input type="text" id="pName" value="${plan.name}" placeholder="地點名稱" class="w-full p-3 bg-gray-50 rounded-xl border-none">
                    </div>
                    <div class="full-width bg-gray-50 p-4 rounded-2xl">
                        <div class="flex gap-4 mb-3">
                            <div>
                                <label class="text-xs text-gray-400">交通 (m)</label>
                                <input type="number" id="pTrans" value="${plan.transportTime}" class="w-16 p-2 bg-white rounded-lg border-none mt-1">
                            </div>
                            <div>
                                <label class="text-xs text-gray-400">停留 (h)</label>
                                <input type="number" id="pStay" value="${plan.stayTime}" class="w-16 p-2 bg-white rounded-lg border-none mt-1">
                            </div>
                        </div>
                    </div>
                    <input type="text" id="pLink" value="${plan.link}" placeholder="連結" class="full-width p-3 bg-gray-50 rounded-xl border-none">
                    <textarea id="pMemo" placeholder="備註" class="full-width p-3 bg-gray-50 rounded-xl border-none h-24">${plan.memo}</textarea>
                </div>
                <button onclick="savePlan('${planId}')" class="w-full bg-[#A36E6E] text-white p-4 rounded-2xl mt-6 font-bold shadow-lg">儲存行程</button>
                ${planId ? `<button onclick="deleteData('plans/${planId}')" class="w-full text-red-400 mt-4 text-sm">刪除行程</button>` : ''}
            `;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        // 記帳 Modal
        function openWalletModal() {
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">記帳 💰</h2>
                    <i class="fas fa-times text-gray-300" onclick="closeModal()"></i>
                </div>
                <div class="flex gap-2 mb-6">
                    <button class="flex-1 py-2 rounded-xl bg-rose-50 text-rose-500 border border-rose-100 font-bold">支出</button>
                    <button class="flex-1 py-2 rounded-xl bg-gray-50 text-gray-400" onclick="alert('換錢請選分類「換錢」並選擇「換錢/退稅」')">換錢/退稅</button>
                </div>
                <input type="number" id="exAmount" placeholder="金額 (日幣 JPY)" class="w-full p-4 bg-gray-100 rounded-2xl border-none text-2xl font-bold mb-4">
                <input type="text" id="exName" placeholder="項目名稱" class="w-full p-4 bg-gray-100 rounded-2xl border-none mb-4">
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select id="exCat" class="p-4 bg-gray-100 rounded-2xl border-none">
                        <option value="食物">食物</option>
                        <option value="購物">購物</option>
                        <option value="交通">交通</option>
                        <option value="住宿">住宿</option>
                        <option value="換錢">換錢</option>
                        <option value="其他">其他</option>
                    </select>
                    <select id="exPay" class="p-4 bg-gray-100 rounded-2xl border-none">
                        <option value="現金 Cash">現金 Cash</option>
                        <option value="刷卡 Card">刷卡 Card</option>
                        <option value="交通卡 IC">交通卡 IC</option>
                    </select>
                </div>
                <select id="exType" class="w-full p-4 bg-gray-100 rounded-2xl border-none mb-6">
                    <option value="實際">當地實際花費</option>
                    <option value="行前">行前預付支出</option>
                    <option value="換錢">日幣現鈔(收入)</option>
                </select>
                <button onclick="saveExpense()" class="w-full bg-[#A36E6E] text-white p-4 rounded-2xl font-bold shadow-lg">儲存紀錄</button>
            `;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        // 待買清單 Modal (預設為食物，指令4)
        function openShopModal() {
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">待買清單 🛍️</h2>
                    <i class="fas fa-times text-gray-300" onclick="closeModal()"></i>
                </div>
                <input type="text" id="sName" placeholder="商品名稱" class="w-full p-4 bg-gray-100 rounded-2xl border-none mb-4">
                <input type="text" id="sImg" placeholder="圖片連結 (從網路上貼過來)" class="w-full p-4 bg-gray-100 rounded-2xl border-none mb-4">
                <select id="sCat" class="w-full p-4 bg-gray-100 rounded-2xl border-none mb-6">
                    <option value="食物" selected>食物</option>
                    <option value="美妝">美妝</option>
                    <option value="伴手禮">伴手禮</option>
                    <option value="服飾">服飾</option>
                    <option value="其他">其他</option>
                </select>
                <button onclick="saveShopItem()" class="w-full bg-[#A36E6E] text-white p-4 rounded-2xl font-bold shadow-lg">儲存</button>
            `;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        // --- Data Operations ---
        function savePlan(id) {
            const data = {
                day: currentState.currentDay,
                time: document.getElementById('pTime').value,
                name: document.getElementById('pName').value,
                transportTime: document.getElementById('pTrans').value,
                stayTime: document.getElementById('pStay').value,
                memo: document.getElementById('pMemo').value,
                link: document.getElementById('pLink').value
            };
            if(id && id !== 'null') db.ref(`tripData/plans/${id}`).update(data);
            else db.ref('tripData/plans').push(data);
            closeModal();
        }

        function saveExpense() {
            const data = {
                amount: document.getElementById('exAmount').value,
                name: document.getElementById('exName').value,
                category: document.getElementById('exCat').value,
                payMethod: document.getElementById('exPay').value,
                type: document.getElementById('exType').value
            };
            db.ref('tripData/expenses').push(data);
            closeModal();
        }

        function saveShopItem() {
            const data = {
                name: document.getElementById('sName').value,
                img: document.getElementById('sImg').value,
                category: document.getElementById('sCat').value,
                purchased: false
            };
            db.ref('tripData/shopItems').push(data);
            closeModal();
        }

        function toggleShopItem(id) {
            const item = currentState.shopItems.find(i => i.id === id);
            // 找出對應的 Firebase key
            db.ref('tripData/shopItems').once('value', snapshot => {
                snapshot.forEach(child => {
                    if(child.val().name === item.name) {
                        child.ref.update({ purchased: !item.purchased });
                    }
                });
            });
        }

        function deleteData(path) {
            if(confirm('確定要刪除嗎？')) {
                db.ref(`tripData/${path}`).remove();
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
        }

        function openEditPlan(id) {
            openPlanModal(id);
        }

        // 4. 恢復圖片匯出功能 (指令3)
        function exportToImage() {
            const element = document.getElementById('exportArea') || document.getElementById('mainContent');
            html2canvas(element, {
                backgroundColor: "#F8F9FA",
                useCORS: true,
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Okayama_Trip_Day${currentState.currentDay}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        init();
    </script>
</body>
</html>
